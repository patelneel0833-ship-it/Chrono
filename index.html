<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CHRONO</title>
<style>
/* ── FONTS inline so no network needed ── */
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap');

:root{
–study:#00E5FF;–gym:#FF6B35;–work:#00E676;
–rest:#B388FF;–chill:#FFAB40;–sleep:#5B8AFF;
–bg:#0B0D1A;–surface:#14172B;
–border:rgba(255,255,255,.1);
–text:#F4F8FF;–muted:rgba(200,215,255,.55);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
width:100%;height:100%;
/* GitHub Pages / iOS Safari safe */
overflow:hidden;
background:var(–bg);
font-family:‘Space Grotesk’,system-ui,sans-serif;
color:var(–text);
-webkit-font-smoothing:antialiased;
-webkit-text-size-adjust:100%;
}
body::before{
content:’’;position:fixed;inset:0;z-index:0;pointer-events:none;
background:
radial-gradient(ellipse 70% 50% at 0% 0%,rgba(0,229,255,.12) 0%,transparent 60%),
radial-gradient(ellipse 60% 45% at 100% 100%,rgba(91,138,255,.13) 0%,transparent 60%),
linear-gradient(180deg,#0B0D1A 0%,#0D1024 100%);
}
/* iOS full-height fix — use -webkit-fill-available */
#app{
position:relative;z-index:1;
width:100%;
height:100vh;
height:-webkit-fill-available;
display:flex;flex-direction:column;
overflow:hidden;
}

/* ════ HEADER ════ */
.hdr{flex-shrink:0;padding:18px 18px 8px;display:flex;align-items:center;justify-content:space-between}
.app-name{
font-size:28px;font-weight:800;letter-spacing:4px;line-height:1;
background:linear-gradient(90deg,#fff 20%,var(–study) 100%);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hdr-sub{font-size:12px;color:var(–muted);font-weight:500;margin-top:4px}
.dring{width:48px;height:48px;position:relative;flex-shrink:0;cursor:pointer}
.dring svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
.dr-t{fill:none;stroke:rgba(255,255,255,.1);stroke-width:4}
.dr-f{fill:none;stroke:var(–study);stroke-width:4;stroke-linecap:round;
stroke-dasharray:125.7;stroke-dashoffset:125.7;transition:stroke-dashoffset .8s ease}
.dr-n{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
font-family:‘Space Mono’,monospace;font-size:10px;font-weight:700;color:var(–study)}

/* ════ DAY NAV ════ */
.day-nav{flex-shrink:0;padding:0 14px 10px;display:flex;align-items:center;gap:6px}
.dn-arrow{width:32px;height:32px;border-radius:10px;border:1px solid var(–border);
background:var(–surface);display:flex;align-items:center;justify-content:center;
font-size:18px;cursor:pointer;flex-shrink:0;color:var(–muted);user-select:none}
.dn-arrow:active{opacity:.5}
.dn-days{flex:1;display:flex;gap:4px;overflow-x:auto}
.dn-days::-webkit-scrollbar{display:none}
.dn-day{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;
cursor:pointer;padding:6px 8px;border-radius:12px;border:1px solid transparent;
transition:all .18s;user-select:none;min-width:40px}
.dn-day:active{opacity:.6}
.dn-day.active{background:rgba(0,229,255,.12);border-color:rgba(0,229,255,.3)}
.dn-dow{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(–muted);font-weight:600}
.dn-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
font-size:14px;font-weight:700}
.dn-day.active .dn-num{background:var(–study);color:#000}
.dn-day.today:not(.active) .dn-num{border:2px solid rgba(0,229,255,.5);color:var(–study)}
.dn-dots{display:flex;gap:2px;height:4px;align-items:center}
.dn-dot{width:4px;height:4px;border-radius:50%}

/* ════ CAT RINGS ════ */
.cat-rings{flex-shrink:0;padding:0 16px 10px;display:flex;gap:10px;overflow-x:auto}
.cat-rings::-webkit-scrollbar{display:none}
.cr-item{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;
background:var(–surface);border:1px solid var(–border);border-radius:14px;
padding:8px 10px;min-width:54px;cursor:pointer}
.cr-item:active{opacity:.7}
.cr-ring{width:42px;height:42px;position:relative}
.cr-ring svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
.cr-t{fill:none;stroke:rgba(255,255,255,.08);stroke-width:4}
.cr-f{fill:none;stroke-width:4;stroke-linecap:round;stroke-dasharray:109.96;stroke-dashoffset:109.96;transition:stroke-dashoffset .6s ease}
.cr-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px}
.cr-time{font-size:9px;color:var(–muted);font-family:‘Space Mono’,monospace;text-align:center;font-weight:700}
.cr-name{font-size:9px;color:var(–muted);text-align:center;font-weight:600}

/* ════ BANNER ════ */
.banner{flex-shrink:0;margin:0 16px 10px;padding:11px 14px;
background:linear-gradient(135deg,rgba(0,229,255,.1),rgba(91,138,255,.07));
border:1px solid rgba(0,229,255,.2);border-radius:14px;
display:flex;align-items:center;gap:10px;cursor:pointer}
.bn-ico{font-size:18px;flex-shrink:0}
.bn-txt{font-size:12px;color:var(–muted);line-height:1.4;flex:1;font-weight:500}
.bn-txt strong{color:var(–text);font-weight:700}
.bn-act{font-size:11px;font-weight:700;color:var(–study);
background:rgba(0,229,255,.12);padding:4px 10px;border-radius:100px;
border:1px solid rgba(0,229,255,.25);white-space:nowrap}

/* ════ ENERGY BAR ════ */
.ebar-wrap{flex-shrink:0;margin:0 16px 10px;
background:var(–surface);border:1px solid var(–border);border-radius:12px;padding:9px 14px}
.ebar-top{display:flex;justify-content:space-between;margin-bottom:6px}
.ebar-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(–muted);font-weight:700}
.ebar-pct{font-family:‘Space Mono’,monospace;font-size:11px;font-weight:700;color:var(–study)}
.ebar{height:7px;border-radius:100px;background:rgba(255,255,255,.07);overflow:hidden}
.ebar-fill{height:100%;border-radius:100px;width:0%;
background:linear-gradient(90deg,var(–study),#5B8AFF,var(–rest));
transition:width .8s ease;box-shadow:0 0 10px rgba(0,229,255,.4)}

/* ════ CHIPS ════ */
.chips{flex-shrink:0;padding:0 16px 8px;display:flex;gap:7px;overflow-x:auto}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:7px 14px;border-radius:100px;
background:var(–surface);border:1px solid var(–border);
font-size:12px;font-weight:600;color:var(–text);
cursor:pointer;white-space:nowrap;user-select:none}
.chip:active{opacity:.6}

/* ════ TIMELINE ════ */
.tl-wrap{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 16px 130px;-webkit-overflow-scrolling:touch}
.tl-wrap::-webkit-scrollbar{display:none}
/* wider left margin so hour labels have room */
.tl{position:relative;margin-left:52px;min-height:calc(24 * 56px)}

.hr-tick{
position:absolute;left:0;right:0;height:56px;
border-top:1px solid rgba(255,255,255,.07);pointer-events:none;
}
/* hour label — positioned left of the timeline with enough space */
.hr-tick::after{
content:attr(data-l);
position:absolute;
left:-50px;
top:-8px;
width:44px;
text-align:right;
font-family:‘Space Mono’,monospace;
font-size:10px;
font-weight:700;
color:var(–muted);
pointer-events:none;
}
.hr-half{position:absolute;left:0;right:0;top:28px;border-top:1px dashed rgba(255,255,255,.03);pointer-events:none}
.hr-tick.glow{border-top-color:rgba(0,230,118,.4);
background:linear-gradient(180deg,rgba(0,230,118,.06) 0%,transparent 100%)}

/* ═══ LIVE DOT ═══ */
.live-ln{position:absolute;left:-14px;right:0;z-index:15;pointer-events:none}
.live-dot{
position:absolute;left:0;top:-7px;
width:14px;height:14px;border-radius:50%;
background:#00E676;
box-shadow:0 0 0 4px rgba(0,230,118,.2),0 0 20px #00E676;
animation:gblink 2s ease-in-out infinite;
}
.live-line{
position:absolute;left:14px;right:0;top:0;height:2px;
background:linear-gradient(90deg,rgba(0,230,118,.7),transparent);
}
@keyframes gblink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}

.dg{position:absolute;left:0;right:0;border:2px dashed rgba(0,229,255,.3);
border-radius:14px;background:rgba(0,229,255,.05);z-index:20;display:none;pointer-events:none}

/* ════ BLOCK CARDS ════ */
.blk{
position:absolute;left:0;right:0;z-index:10;
border-radius:14px;
border-left:4px solid;
border-top:1px solid;border-right:1px solid;border-bottom:1px solid;
cursor:pointer;overflow:hidden;
display:flex;align-items:stretch;
animation:blkin .28s cubic-bezier(.34,1.56,.64,1) both;
min-height:28px;
}
@keyframes blkin{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.blk:active{opacity:.8}

.blk-body{flex:1;padding:7px 10px;overflow:hidden;min-width:0}
.blk-nm{font-size:13px;font-weight:700;line-height:1.3;
white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff}
.blk-t{font-family:‘Space Mono’,monospace;font-size:9px;color:var(–muted);
margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* delete strip — right side, full height, always tappable */
.blk-del{
flex-shrink:0;width:46px;
display:flex;align-items:center;justify-content:center;
font-size:20px;font-weight:700;
background:rgba(255,56,96,.2);
border-left:1px solid rgba(255,56,96,.3);
border-radius:0 10px 10px 0;
color:#FF3860;cursor:pointer;
-webkit-tap-highlight-color:transparent;
}
.blk-del:active{background:rgba(255,56,96,.4)}

/* done state */
.blk.done-blk{opacity:.5;filter:saturate(.25)}
.blk.done-blk .blk-nm{text-decoration:line-through}
.blk.done-blk .blk-body::before{
content:’✓ ’;color:#00E676;font-weight:800;font-size:13px;
}

/* per-category colors */
.blk-study{background:linear-gradient(135deg,rgba(0,229,255,.14),rgba(0,229,255,.05));border-color:rgba(0,229,255,.25);border-left-color:var(–study)}
.blk-gym  {background:linear-gradient(135deg,rgba(255,107,53,.14),rgba(255,107,53,.05));border-color:rgba(255,107,53,.25);border-left-color:var(–gym)}
.blk-work {background:linear-gradient(135deg,rgba(0,230,118,.14),rgba(0,230,118,.05));border-color:rgba(0,230,118,.25);border-left-color:var(–work)}
.blk-rest {background:linear-gradient(135deg,rgba(179,136,255,.14),rgba(179,136,255,.05));border-color:rgba(179,136,255,.25);border-left-color:var(–rest)}
.blk-chill{background:linear-gradient(135deg,rgba(255,171,64,.14),rgba(255,171,64,.05));border-color:rgba(255,171,64,.25);border-left-color:var(–chill)}
.blk-sleep{background:linear-gradient(135deg,rgba(91,138,255,.14),rgba(91,138,255,.05));border-color:rgba(91,138,255,.25);border-left-color:var(–sleep)}
.blk-study .blk-nm{color:var(–study)}
.blk-gym   .blk-nm{color:var(–gym)}
.blk-work  .blk-nm{color:var(–work)}
.blk-rest  .blk-nm{color:var(–rest)}
.blk-chill .blk-nm{color:var(–chill)}
.blk-sleep .blk-nm{color:var(–sleep)}

/* ════ FAB ════ */
.fab-wrap{position:fixed;bottom:26px;right:18px;z-index:60;display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.sd-items{display:flex;flex-direction:column;gap:8px;align-items:flex-end;
opacity:0;pointer-events:none;transform:translateY(10px);transition:all .22s cubic-bezier(.34,1.4,.64,1)}
.fab-wrap.open .sd-items{opacity:1;pointer-events:all;transform:translateY(0)}
.sd-btn{display:flex;align-items:center;gap:8px;cursor:pointer}
.sd-label{font-size:13px;font-weight:600;
background:rgba(11,13,26,.96);border:1px solid rgba(0,229,255,.2);
padding:7px 16px;border-radius:100px;white-space:nowrap;color:var(–text)}
.sd-circ{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.fab{width:58px;height:58px;border-radius:50%;border:none;
background:linear-gradient(135deg,var(–study) 0%,#5B8AFF 100%);
color:#000;font-size:30px;line-height:1;display:flex;align-items:center;justify-content:center;
cursor:pointer;
box-shadow:0 0 32px rgba(0,229,255,.45),0 6px 20px rgba(0,0,0,.5);
transition:transform .22s cubic-bezier(.34,1.56,.64,1),background .2s;font-weight:300}
.fab-wrap.open .fab{background:linear-gradient(135deg,#FF3860,#FF6B35);transform:rotate(45deg)}
.fab:active{transform:scale(.88)!important}

/* ════ WEEK BTN ════ */
.week-btn{position:fixed;bottom:26px;left:18px;z-index:60;
padding:12px 20px;border-radius:16px;border:1px solid rgba(91,138,255,.3);
background:rgba(11,13,26,.95);font-size:13px;font-weight:700;color:var(–text);
cursor:pointer;display:flex;align-items:center;gap:7px;
box-shadow:0 0 20px rgba(91,138,255,.15),0 4px 16px rgba(0,0,0,.4)}
.week-btn:active{opacity:.7}

/* ════ MODAL ════ */
.ov{position:fixed;inset:0;z-index:100;background:rgba(8,10,22,.88);
backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .22s}
.ov.show{opacity:1;pointer-events:all}
.sheet{width:100%;background:#111626;border:1px solid rgba(255,255,255,.12);border-bottom:none;
border-radius:24px 24px 0 0;padding:20px 18px 50px;
transform:translateY(100%);transition:transform .34s cubic-bezier(.34,1.1,.64,1)}
.ov.show .sheet{transform:translateY(0)}
.sh-handle{width:36px;height:4px;border-radius:2px;background:rgba(0,229,255,.4);margin:0 auto 18px}
.sh-title{font-size:22px;font-weight:800;margin-bottom:18px}
.fl{margin-bottom:14px}
.fl label{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;
color:var(–muted);margin-bottom:7px;font-weight:700}
.fi{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);
border-radius:14px;padding:14px 16px;color:var(–text);
font-family:‘Space Grotesk’,system-ui,sans-serif;font-size:16px;font-weight:600;
outline:none;-webkit-appearance:none;appearance:none;transition:border-color .18s,box-shadow .18s}
.fi:focus{border-color:rgba(0,229,255,.5);box-shadow:0 0 0 3px rgba(0,229,255,.12)}
.tp{display:flex;gap:8px}.tp .fi{text-align:center}
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cb{padding:13px 8px;border-radius:14px;border:1px solid var(–border);background:rgba(255,255,255,.04);
display:flex;flex-direction:column;align-items:center;gap:5px;
font-size:12px;font-weight:600;color:var(–muted);cursor:pointer;transition:all .15s;user-select:none}
.cb .ci{font-size:22px}
.cb.sel{border-width:2px}
.cb[data-c=study].sel{border-color:var(–study);color:var(–study);background:rgba(0,229,255,.1)}
.cb[data-c=gym].sel  {border-color:var(–gym);  color:var(–gym);  background:rgba(255,107,53,.1)}
.cb[data-c=work].sel {border-color:var(–work); color:var(–work); background:rgba(0,230,118,.1)}
.cb[data-c=rest].sel {border-color:var(–rest); color:var(–rest); background:rgba(179,136,255,.1)}
.cb[data-c=chill].sel{border-color:var(–chill);color:var(–chill);background:rgba(255,171,64,.1)}
.cb[data-c=sleep].sel{border-color:var(–sleep);color:var(–sleep);background:rgba(91,138,255,.1)}
.overnight-row{display:flex;align-items:center;justify-content:space-between;
padding:12px 14px;border-radius:13px;background:rgba(255,255,255,.04);border:1px solid var(–border)}
.overnight-row span{font-size:13px;color:var(–muted);font-weight:500}
.tog{width:42px;height:24px;border-radius:12px;background:rgba(255,255,255,.1);
position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tog.on{background:var(–sleep);box-shadow:0 0 12px rgba(91,138,255,.4)}
.tog::after{content:’’;position:absolute;width:18px;height:18px;border-radius:50%;
background:#fff;top:3px;left:3px;transition:left .2s}
.tog.on::after{left:21px}
.svbtn{width:100%;margin-top:18px;padding:16px;border-radius:16px;border:none;
background:linear-gradient(90deg,var(–study),#5B8AFF);
color:#000;font-family:‘Space Grotesk’,system-ui,sans-serif;
font-size:17px;font-weight:800;cursor:pointer;
box-shadow:0 4px 24px rgba(0,229,255,.32);letter-spacing:.5px}
.svbtn:active{opacity:.8}

/* ════ WEEK VIEW ════ */
.week-view{position:fixed;inset:0;z-index:80;background:var(–bg);
display:flex;flex-direction:column;overflow:hidden;
opacity:0;pointer-events:none;transform:translateY(20px);transition:all .28s ease}
.week-view.show{opacity:1;pointer-events:all;transform:translateY(0)}
.wv-hdr{flex-shrink:0;padding:20px 18px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(–border)}
.wv-title{font-size:20px;font-weight:800;flex:1}
.wv-close{width:34px;height:34px;border-radius:10px;border:1px solid var(–border);
background:var(–surface);display:flex;align-items:center;justify-content:center;
font-size:18px;cursor:pointer;color:var(–muted)}
.wv-scroll{flex:1;overflow-y:auto;padding:14px 18px 40px}
.wv-scroll::-webkit-scrollbar{display:none}
.wv-week{margin-bottom:28px}
.wv-week-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(–muted);margin-bottom:10px;font-weight:700}
.wv-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.wv-cell{border-radius:12px;background:var(–surface);border:1px solid var(–border);
padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all .18s}
.wv-cell:active{opacity:.7}
.wv-cell.today{border-color:rgba(0,229,255,.45)}
.wv-cell.active-day{border-color:var(–study);background:rgba(0,229,255,.08)}
.wv-cdow{font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:var(–muted);font-weight:700}
.wv-cnum{font-size:15px;font-weight:800}
.wv-cell.today .wv-cnum{color:var(–study)}
.wv-cbars{width:100%;display:flex;flex-direction:column;gap:2px;min-height:18px}
.wv-cbar{width:100%;height:4px;border-radius:2px}
.wv-cscore{font-size:9px;font-family:‘Space Mono’,monospace;color:var(–muted);font-weight:700}

/* ════ CAT CUSTOMIZE MODAL ════ */
.cat-modal{position:fixed;inset:0;z-index:150;background:rgba(8,10,22,.9);
backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .22s}
.cat-modal.show{opacity:1;pointer-events:all}
.cat-sheet{width:100%;background:#111626;border:1px solid rgba(255,255,255,.12);border-bottom:none;
border-radius:24px 24px 0 0;padding:20px 18px 50px;
transform:translateY(100%);transition:transform .34s cubic-bezier(.34,1.1,.64,1)}
.cat-modal.show .cat-sheet{transform:translateY(0)}
.cat-edit-title{font-size:20px;font-weight:800;margin-bottom:4px}
.cat-edit-sub{font-size:12px;color:var(–muted);margin-bottom:18px}
.color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:18px}
.color-swatch{width:100%;aspect-ratio:1;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .18s}
.color-swatch.sel{border-color:#fff;transform:scale(1.15)}
.cat-name-row{display:flex;gap:10px;align-items:center;margin-bottom:16px}
.cat-name-row .fi{flex:1}
.cat-save-btn{width:100%;padding:14px;border-radius:14px;border:none;
font-family:‘Space Grotesk’,system-ui,sans-serif;font-size:16px;font-weight:700;cursor:pointer}

/* ════ FOCUS SCREEN ════ */
.focus-scr{position:fixed;inset:0;z-index:200;
background:#04050F;
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
opacity:0;pointer-events:none;transition:opacity .35s;overflow:hidden}
.focus-scr.on{opacity:1;pointer-events:all}
.focus-bg{position:absolute;inset:-30px;z-index:0;
animation:fpulse 4s ease-in-out infinite alternate}
@keyframes fpulse{0%{transform:scale(1)}100%{transform:scale(1.1)}}
.focus-c{position:relative;z-index:1;display:flex;flex-direction:column;
align-items:center;gap:20px;width:100%;padding:0 24px}
.fring{position:relative;width:220px;height:220px}

stroke-dasharray:628.3;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear}

align-items:center;justify-content:center;gap:4px}
.f-timer{font-family:‘Space Mono’,monospace;font-size:44px;font-weight:700;letter-spacing:3px;line-height:1}
.f-nm{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(–muted);font-weight:700}
.pomo-dots{display:flex;gap:8px}
.pomo-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.1);transition:all .3s}
.pomo-dot.done{background:currentColor}
.f-quote{max-width:280px;text-align:center;font-size:15px;line-height:1.7;color:var(–muted);font-weight:500}
.future-box{width:100%;padding:14px 18px;border-radius:16px;
background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);text-align:center}
.fb-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(–muted);margin-bottom:5px;font-weight:700}
.fb-body{font-size:14px;line-height:1.55;color:var(–text);font-weight:500}
.focus-btns{display:flex;gap:12px}
.f-btn{padding:14px 32px;border-radius:100px;border:1px solid rgba(255,255,255,.15);
background:rgba(255,255,255,.08);color:var(–muted);
font-family:‘Space Grotesk’,system-ui,sans-serif;font-size:15px;font-weight:700;cursor:pointer}
.f-btn.primary{background:rgba(255,255,255,.15);color:var(–text);border-color:rgba(255,255,255,.25)}
.f-btn:active{opacity:.7}

/* ════ CELEBRATION ════ */
.celebrate{position:fixed;inset:0;z-index:500;
display:flex;align-items:center;justify-content:center;
background:rgba(4,5,15,.94);
opacity:0;pointer-events:none;transition:opacity .3s}
.celebrate.show{opacity:1;pointer-events:all}
.cel-content{display:flex;flex-direction:column;align-items:center;gap:16px;
animation:celPop .5s cubic-bezier(.34,1.56,.64,1) both}
@keyframes celPop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.cel-emoji{font-size:90px;animation:bounce 1s ease-in-out infinite alternate}
@keyframes bounce{0%{transform:translateY(0)}100%{transform:translateY(-14px)}}
.cel-title{font-size:34px;font-weight:800;
background:linear-gradient(90deg,#00E676,#00E5FF);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cel-msg{font-size:16px;color:var(–muted);text-align:center;max-width:260px;line-height:1.5;font-weight:500}
.cel-streak{font-size:20px;font-weight:700;color:var(–chill)}
.cel-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.cp{position:absolute;width:8px;height:8px;border-radius:50%;animation:cpFall 1.5s ease-in forwards}
@keyframes cpFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ════ TOAST ════ */
.toast{position:fixed;top:16px;left:50%;transform:translate(-50%,-90px);z-index:600;
background:#1A1F38;border:1px solid rgba(0,229,255,.2);border-radius:14px;
padding:11px 22px;font-size:14px;font-weight:700;white-space:nowrap;
box-shadow:0 8px 32px rgba(0,0,0,.5);
transition:transform .32s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
.toast.show{transform:translate(-50%,0)}
</style>

</head>

<script>
// ════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════
var PX=56; // px per hour — bigger so blocks are taller
var DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// Default category config — can be customized per user
var DEFAULT_CATS={
  study:{name:'Study', icon:'📚', color:'#00E5FF'},
  gym:  {name:'Gym',   icon:'💪', color:'#FF6B35'},
  work: {name:'Work',  icon:'💼', color:'#00E676'},
  rest: {name:'Rest',  icon:'🧘', color:'#B388FF'},
  chill:{name:'Chill', icon:'🎮', color:'#FFAB40'},
  sleep:{name:'Sleep', icon:'🌙', color:'#5B8AFF'},
};
var CAT_ORDER=['study','gym','work','rest','chill','sleep'];
var CAT_MAX={study:6,gym:2,work:8,rest:2,chill:3,sleep:8};

var PALETTE=[
  '#00E5FF','#5B8AFF','#B388FF','#FF4D8D','#FF6B35',
  '#FFAB40','#00E676','#FF3860','#F9CA24','#6C5CE7',
  '#00CEC9','#FD79A8','#FDCB6E','#55EFC4','#74B9FF','#A29BFE','#E17055','#81ECEC'
];

var QUOTES={
  study:['Discipline beats motivation.','Small steps daily = big results.','Your future self is watching.','Study now, shine later.'],
  gym:  ['One more rep.','You showed up. That\'s 80%.','Push. Rest. Repeat.','Your body can do it.'],
  work: ['Deep work is the superpower of this era.','One task. Full attention.','Focus beats multitasking.','Ship it.'],
  rest: ['Rest is productive.','Stillness is strength.','Breathe. Reset. Return.','Recovery is growth.'],
  chill:['Balance is everything.','Joy is not a luxury.','Recharge to return stronger.'],
  sleep:['Sleep is the ultimate performance tool.','Rest well. Rise strong.','Protect your sleep.']
};
var CEL_MSGS={
  study:['Brain gains unlocked! 📚','Knowledge secured. Well done.','Study session crushed!'],
  gym:  ['Beast mode! 💪','Gains secured.','One rep at a time — done!'],
  work: ['Shipped! 🚀','Deep work done. That\'s rare.','Focused and finished.'],
  rest: ['Recharged and ready.','Rest is growth too.','Balance maintained. ✓'],
  chill:['You earned this.','Joy mode complete.','Refreshed!'],
  sleep:['Sleep secured. 🌙','Rest well, rise strong.','Recovery complete.']
};
var QUICK=[
  {label:'📚 Study 2h', n:'Study',  s:'14:00',e:'16:00',c:'study'},
  {label:'💪 Gym 1h',   n:'Gym',    s:'06:30',e:'07:30',c:'gym'  },
  {label:'🧘 Rest 30m', n:'Rest',   s:'13:00',e:'13:30',c:'rest' },
  {label:'💼 Work 2h',  n:'Work',   s:'09:00',e:'11:00',c:'work' },
  {label:'🌙 Sleep 8h', n:'Sleep',  s:'22:30',e:'06:30',c:'sleep',overnight:true},
];

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
var today     = dateKey(new Date());
var viewDay   = today;
var weekBase  = getWeekMon(new Date());
var selCat    = 'study';
var isON      = false;   // overnight toggle
var fabOpen   = false;
var focusBlk  = null;
var focusTid  = null;
var focusPaused = false;
var toastTid  = null;
var drag      = {on:false,moved:false,y0:0,y1:0};
var editingCat= null;  // category being customized
var selColor  = null;

// ════════════════════════════════════════
// STORAGE
// ════════════════════════════════════════
function loadDay(dk){try{return JSON.parse(localStorage.getItem('ch5_'+dk)||'[]');}catch(e){return [];}}
function saveDay(dk,arr){localStorage.setItem('ch5_'+dk,JSON.stringify(arr));}
function loadCats(){
  try{return JSON.parse(localStorage.getItem('ch5_cats')||'null')||JSON.parse(JSON.stringify(DEFAULT_CATS));}
  catch(e){return JSON.parse(JSON.stringify(DEFAULT_CATS));}
}
function saveCats(cats){localStorage.setItem('ch5_cats',JSON.stringify(cats));}
function getStreak(){return parseInt(localStorage.getItem('ch5_streak')||'0',10);}
function setStreak(n){localStorage.setItem('ch5_streak',String(n));}
function getCats(){return loadCats();}

// ════════════════════════════════════════
// UTILS
// ════════════════════════════════════════
function pad(n){return String(Math.floor(n)).padStart(2,'0');}
function uid(){return 'b'+Date.now()+Math.random().toString(36).slice(2,5);}
function toMin(t){var p=t.split(':').map(Number);return p[0]*60+p[1];}
function fmt12(t){var p=t.split(':').map(Number),h=p[0],m=p[1];return(h%12||12)+':'+pad(m)+(h<12?'am':'pm');}
function fmtH(m){var h=Math.floor(m/60),mn=m%60;return mn?(h?h+'h ':'')+mn+'m':h+'h';}
function dateKey(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function getWeekMon(d){var day=d.getDay(),diff=day===0?-6:1-day;return addDays(d,diff);}
function catMinsForDay(dk,cat){
  return loadDay(dk).filter(function(b){return b.c===cat;})
    .reduce(function(a,b){return a+(toMin(b.e)-toMin(b.s));},0);
}
function getCatColor(cat){return getCats()[cat]?getCats()[cat].color:(DEFAULT_CATS[cat]?DEFAULT_CATS[cat].color:'#888');}
function getCatIcon(cat){return getCats()[cat]?getCats()[cat].icon:(DEFAULT_CATS[cat]?DEFAULT_CATS[cat].icon:'⚡');}
function getCatName(cat){return getCats()[cat]?getCats()[cat].name:(DEFAULT_CATS[cat]?DEFAULT_CATS[cat].name:cat);}

// ════════════════════════════════════════
// BOOT
// ════════════════════════════════════════
window.addEventListener('DOMContentLoaded',function(){
  migrateOldData();
  initGreeting();
  buildDayNav();
  buildCatRings();
  buildChips();
  buildSpeedDial();
  buildHourGrid();
  initModal();
  initFocusUI();
  initCatModal();
  renderDay();
  tickLiveLine();
  setInterval(tickLiveLine,30000);
  scrollToNow();
  updateBanner();
  checkStreak();
});

function migrateOldData(){
  // wipe old keys from previous versions
  if(!localStorage.getItem('ch5_init')){
    ['chrono_v3','chrono_v4','cv5','cv5_streak','cv5_ld','cv5_init','cv4']
      .forEach(function(k){localStorage.removeItem(k);});
    localStorage.setItem('ch5_init','1');
  }
}

// ════════════════════════════════════════
// GREETING
// ════════════════════════════════════════
function initGreeting(){
  var h=new Date().getHours();
  var g=h<12?'Good morning ☀️':h<17?'Good afternoon 🌤':h<21?'Good evening 🌙':'Night mode 🌌';
  document.getElementById('hdrSub').textContent=g;
}
function updateHeaderDate(){
  var d=new Date(viewDay+'T12:00:00');
  var isT=viewDay===today,isTom=viewDay===dateKey(addDays(new Date(),1)),isY=viewDay===dateKey(addDays(new Date(),-1));
  var lbl=isT?'Today ·':isTom?'Tomorrow ·':isY?'Yesterday ·':DAYS[d.getDay()]+' ·';
  document.getElementById('hdrSub').textContent=lbl+' '+MONTHS[d.getMonth()]+' '+d.getDate();
}

// ════════════════════════════════════════
// DAY NAV
// ════════════════════════════════════════
function buildDayNav(){renderDayNav();}
function renderDayNav(){
  var c=document.getElementById('dnDays');c.innerHTML='';
  for(var i=0;i<7;i++){
    var d=addDays(weekBase,i),dk=dateKey(d);
    var dayBl=loadDay(dk),isT=dk===today,isA=dk===viewDay;
    var el=document.createElement('div');
    el.className='dn-day'+(isT?' today':'')+(isA?' active':'');
    var dow=document.createElement('div');dow.className='dn-dow';dow.textContent=DAYS[d.getDay()].slice(0,2);
    var num=document.createElement('div');num.className='dn-num';num.textContent=d.getDate();
    var dots=document.createElement('div');dots.className='dn-dots';
    var seen={};dayBl.forEach(function(b){seen[b.c]=1;});
    Object.keys(seen).forEach(function(cat){
      var dot=document.createElement('div');dot.className='dn-dot';
      dot.style.background=getCatColor(cat);dots.appendChild(dot);
    });
    el.appendChild(dow);el.appendChild(num);el.appendChild(dots);
    el.addEventListener('click',(function(k){return function(){switchDay(k);};})(dk));
    c.appendChild(el);
  }
}
function switchDay(dk){viewDay=dk;renderDayNav();renderDay();updateHeaderDate();updateBanner();scrollToNow();}
function shiftWeek(dir){weekBase=addDays(weekBase,dir*7);renderDayNav();}

// ════════════════════════════════════════
// WEEK VIEW
// ════════════════════════════════════════
function openWeekView(){buildWeekContent();document.getElementById('weekView').classList.add('show');}
function closeWeekView(){document.getElementById('weekView').classList.remove('show');}
function buildWeekContent(){
  var c=document.getElementById('wvScroll');c.innerHTML='';
  var ref=new Date();
  for(var w=0;w<4;w++){
    var wb=getWeekMon(addDays(ref,-w*7));
    var sec=document.createElement('div');sec.className='wv-week';
    var lbl=document.createElement('div');lbl.className='wv-week-label';
    lbl.textContent=w===0?'This Week':w===1?'Last Week':MONTHS[wb.getMonth()]+' '+wb.getDate();
    sec.appendChild(lbl);
    var grid=document.createElement('div');grid.className='wv-grid';
    for(var i=0;i<7;i++){
      var d=addDays(wb,i),dk=dateKey(d);
      var bl=loadDay(dk),tot=bl.length,don=bl.filter(function(b){return b.done;}).length;
      var sc=tot?Math.round(don/tot*100):0;
      var cell=document.createElement('div');
      cell.className='wv-cell'+(dk===today?' today':'')+(dk===viewDay?' active-day':'');
      var cdow=document.createElement('div');cdow.className='wv-cdow';cdow.textContent=DAYS[d.getDay()].slice(0,2);
      var cnum=document.createElement('div');cnum.className='wv-cnum';cnum.textContent=d.getDate();
      var cbars=document.createElement('div');cbars.className='wv-cbars';
      var seen={};bl.forEach(function(b){seen[b.c]=1;});
      Object.keys(seen).forEach(function(cat){
        var bar=document.createElement('div');bar.className='wv-cbar';
        bar.style.background=getCatColor(cat);bar.style.opacity='0.8';cbars.appendChild(bar);
      });
      var cscore=document.createElement('div');cscore.className='wv-cscore';cscore.textContent=tot?sc+'%':'—';
      cell.appendChild(cdow);cell.appendChild(cnum);cell.appendChild(cbars);cell.appendChild(cscore);
      cell.addEventListener('click',(function(k){return function(){
        closeWeekView();weekBase=getWeekMon(new Date(k+'T12:00:00'));switchDay(k);
      };})(dk));
      grid.appendChild(cell);
    }
    sec.appendChild(grid);c.appendChild(sec);
  }
}

// ════════════════════════════════════════
// CAT RINGS
// ════════════════════════════════════════
function buildCatRings(){
  var c=document.getElementById('catRings');c.innerHTML='';
  var cats=getCats();
  CAT_ORDER.forEach(function(cat){
    var item=document.createElement('div');item.className='cr-item';
    var ring=document.createElement('div');ring.className='cr-ring';
    var col=cats[cat]?cats[cat].color:'#888';
    var icon=cats[cat]?cats[cat].icon:'⚡';
    ring.innerHTML='<svg viewBox="0 0 42 42"><circle class="cr-t" cx="21" cy="21" r="17.5"/>'
      +'<circle class="cr-f" cx="21" cy="21" r="17.5" id="crf-'+cat+'" style="stroke:'+col+'"/></svg>'
      +'<div class="cr-inner">'+icon+'</div>';
    var time=document.createElement('div');time.className='cr-time';time.id='crt-'+cat;time.textContent='—';
    var name=document.createElement('div');name.className='cr-name';name.textContent=cats[cat]?cats[cat].name:cat;
    item.appendChild(ring);item.appendChild(time);item.appendChild(name);
    // long-press or tap to customize
    item.addEventListener('click',(function(k){return function(){openCatModal(k);};})(cat));
    c.appendChild(item);
  });
}
function updateCatRings(){
  var circ=109.96,cats=getCats();
  CAT_ORDER.forEach(function(cat){
    var mins=catMinsForDay(viewDay,cat);
    var pct=Math.min(mins/((CAT_MAX[cat]||4)*60),1);
    var el=document.getElementById('crf-'+cat);
    if(el)el.style.strokeDashoffset=circ-(pct*circ);
    var tl=document.getElementById('crt-'+cat);
    if(tl)tl.textContent=mins?fmtH(mins):'—';
  });
}

function openCatModal(cat){
  editingCat=cat;
  var cats=getCats();
  var cfg=cats[cat]||DEFAULT_CATS[cat]||{name:cat,icon:'⚡',color:'#888'};
  document.getElementById('catEditTitle').textContent='Edit: '+cfg.name;

function closeCatModal(){document.getElementById('catModal').classList.remove('show');}
function saveCatCustom(){
  if(!editingCat)return;
  var cats=getCats();
  var name=document.getElementById('catNameInput').value.trim()||getCatName(editingCat);
  var icon=document.getElementById('catIconInput').value.trim()||getCatIcon(editingCat);

  refreshCatGrid();

function refreshCatGrid(){
  var cats=getCats();
  CAT_ORDER.forEach(function(cat){
    var lbl=document.getElementById('clb-'+cat);
    if(lbl)lbl.textContent=cats[cat]?cats[cat].name:cat;
    var btn=document.querySelector('.cb[data-c="'+cat+'"] .ci');
    if(btn)btn.textContent=cats[cat]?cats[cat].icon:getCatIcon(cat);
  });
}

// SPEED DIAL
// ════════════════════════════════════════
function buildSpeedDial(){

    {label:'Add Study',c:'study'},{label:'Add Gym',c:'gym'},{label:'Add Custom',c:'study',custom:true}

function hexRgb(h){
  if(!h||h.length<7)return '255,255,255';
  return parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16);
}
function fabToggle(){fabOpen?closeFab():openFab();}
function openFab(){fabOpen=true;document.getElementById('fabWrap').classList.add('open');}
function closeFab(){fabOpen=false;document.getElementById('fabWrap').classList.remove('open');}

// ════════════════════════════════════════
// HOUR GRID + DRAG
// ════════════════════════════════════════
function buildHourGrid(){
  var tl=document.getElementById('tl');
  for(var h=0;h<24;h++){
    var row=document.createElement('div');row.className='hr-tick';row.id='hr-'+h;
    row.style.top=(h*PX)+'px';
    var label=h===0?'12am':h<12?h+'am':h===12?'12pm':(h-12)+'pm';
    row.setAttribute('data-l',label);
    var half=document.createElement('div');half.className='hr-half';
    row.appendChild(half);tl.appendChild(row);
  }
  tl.addEventListener('pointerdown',onDragDown);
  tl.addEventListener('pointermove',onDragMove);
  tl.addEventListener('pointerup',  onDragUp);
}
function onDragDown(e){
  if(e.target.closest('.blk'))return;
  drag.on=true;drag.moved=false;
  var r=document.getElementById('tl').getBoundingClientRect();
  drag.y0=e.clientY-r.top;drag.y1=drag.y0;
  document.getElementById('tl').setPointerCapture(e.pointerId);
}
function onDragMove(e){
  if(!drag.on)return;
  var r=document.getElementById('tl').getBoundingClientRect();
  drag.y1=e.clientY-r.top;
  if(Math.abs(drag.y1-drag.y0)>12){
    drag.moved=true;
    var g=document.getElementById('dg');
    g.style.display='block';
    g.style.top=Math.min(drag.y0,drag.y1)+'px';
    g.style.height=Math.abs(drag.y1-drag.y0)+'px';
  }
}
function onDragUp(e){
  document.getElementById('dg').style.display='none';
  if(!drag.on)return;drag.on=false;
  if(!drag.moved)return;drag.moved=false;
  var snap=15,minY=Math.min(drag.y0,drag.y1),maxY=Math.max(drag.y0,drag.y1);
  var sMin=Math.round(minY/PX*60/snap)*snap;
  var eMin=Math.round(maxY/PX*60/snap)*snap;
  if(eMin-sMin<15)return;
  document.getElementById('fStart').value=pad(Math.floor(sMin/60))+':'+pad(sMin%60);
  document.getElementById('fEnd').value  =pad(Math.floor(eMin/60))+':'+pad(eMin%60);
  document.getElementById('shTitle').textContent='New Block';
  openModal();
}

// ════════════════════════════════════════
// LIVE LINE
// ════════════════════════════════════════
function tickLiveLine(){
  var now=new Date(),isT=viewDay===today;
  var ln=document.getElementById('liveLn');
  ln.style.display=isT?'block':'none';
  if(!isT)return;
  var top=(now.getHours()+now.getMinutes()/60)*PX;
  ln.style.top=top+'px';
  document.querySelectorAll('.hr-tick').forEach(function(el){el.classList.remove('glow');});
  var hr=document.getElementById('hr-'+now.getHours());
  if(hr)hr.classList.add('glow');
}
function scrollToNow(){
  var isT=viewDay===today;
  var top=isT?Math.max((new Date().getHours()-1)*PX,0):0;
  setTimeout(function(){document.getElementById('tlWrap').scrollTo({top:top,behavior:'smooth'});},300);
}

// ════════════════════════════════════════
// RENDER
// ════════════════════════════════════════
function renderDay(){
  document.querySelectorAll('.blk').forEach(function(el){el.remove();});
  var dayBl=loadDay(viewDay);
  dayBl.forEach(function(bl){renderBlock(bl);});
  updateStats(dayBl);
  updateCatRings();
  updateEnergyBar(dayBl);
  tickLiveLine();
  renderDayNav();
}
function renderBlock(bl){
  var topPx=toMin(bl.s)/60*PX;
  var durMin=toMin(bl.e)-toMin(bl.s);
  if(bl.overnight&&durMin<0)durMin=1440-toMin(bl.s);
  var hPx=Math.max(durMin/60*PX-3,28);
  var maxH=24*PX-topPx-2;
  hPx=Math.min(hPx,maxH);

  var el=document.createElement('div');
  el.className='blk blk-'+bl.c+(bl.done?' done-blk':'');
  el.style.top=topPx+'px';el.style.height=hPx+'px';
  // custom color override
  var cats=getCats();
  if(cats[bl.c]){
    var col=cats[bl.c].color;
    el.style.borderLeftColor=col;
  }

  var body=document.createElement('div');body.className='blk-body';
  var nm=document.createElement('div');nm.className='blk-nm';nm.textContent=bl.n;
  body.appendChild(nm);
  if(hPx>=38){
    var tm=document.createElement('div');tm.className='blk-t';
    tm.textContent=fmt12(bl.s)+' – '+(bl.overnight?'next day '+fmt12(bl.e):fmt12(bl.e));
    body.appendChild(tm);
  }

  var dl=document.createElement('div');dl.className='blk-del';dl.textContent='✕';dl.dataset.id=bl.id;

  el.appendChild(body);el.appendChild(dl);
  document.getElementById('tl').appendChild(el);

  body.addEventListener('click',(function(b){return function(){enterFocus(b);};})(bl));
  dl.addEventListener('click',function(e){
    e.stopPropagation();
    var id=dl.dataset.id;
    var arr=loadDay(viewDay).filter(function(b){return b.id!==id;});
    saveDay(viewDay,arr);renderDay();updateBanner();showToast('🗑 Removed');
  });
}
function addBlockToDay(dk,bl){var arr=loadDay(dk);arr.push(bl);saveDay(dk,arr);}

// ════════════════════════════════════════
// STATS
// ════════════════════════════════════════
function updateStats(dayBl){
  var tot=dayBl.length,don=dayBl.filter(function(b){return b.done;}).length;
  var score=tot?Math.round(don/tot*100):0;
  document.getElementById('drNum').textContent=score+'%';
  var circ=125.7;
  document.getElementById('drFill').style.strokeDashoffset=circ-(score/100)*circ;
}
function updateEnergyBar(dayBl){
  var mins=dayBl.filter(function(b){return b.c==='study'||b.c==='gym'||b.c==='work';})
    .reduce(function(a,b){return a+(toMin(b.e)-toMin(b.s));},0);
  var pct=Math.min(mins/(8*60)*100,100);
  document.getElementById('ebarFill').style.width=pct+'%';
  document.getElementById('ebarPct').textContent=Math.round(pct)+'%';
}

// ════════════════════════════════════════
// BANNER
// ════════════════════════════════════════
function updateBanner(){
  var dayBl=loadDay(viewDay);
  var tot=dayBl.length,don=dayBl.filter(function(b){return b.done;}).length;
  var now=new Date(),hm=pad(now.getHours())+':'+pad(now.getMinutes());
  var isFut=viewDay>today,isPast=viewDay<today,streak=getStreak();
  var txt,act='';
  if(!tot){
    txt=isFut?'<strong>Plan this day</strong> — add blocks for tomorrow.':
        isPast?'<strong>No tasks logged</strong> for this day.':
        '<strong>Start planning</strong> — tap + or drag on timeline.';
    act=!isPast?'ADD →':'';
  } else if(isPast){
    txt='<strong>'+don+'/'+tot+' completed</strong> on this day.';act='';
  } else if(streak>2){
    txt='🔥 <strong>'+streak+'-day streak!</strong> Complete today\'s blocks to keep it.';act='';
  } else {
    var missed=dayBl.filter(function(b){return !b.done&&b.e<hm;});
    if(missed.length){
      txt='Missed: <strong>'+missed[0].n+'</strong>. Reschedule it?';act='RESCHEDULE';
    } else {
      txt='<strong>'+don+'/'+tot+' done.</strong> '+(don===tot?'Perfect day 🎯':'Keep going!');act='';
    }
  }
  document.getElementById('bnTxt').innerHTML=txt;
  document.getElementById('bnAct').textContent=act;
}

// ════════════════════════════════════════
// MODAL
// ════════════════════════════════════════
function initModal(){
  document.getElementById('ov').addEventListener('click',function(e){
    if(e.target===document.getElementById('ov'))closeModal();
  });
  document.querySelectorAll('.cb').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.cb').forEach(function(b){b.classList.remove('sel');});
      btn.classList.add('sel');selCat=btn.dataset.c;
      isON=selCat==='sleep';
      document.getElementById('togON').classList.toggle('on',isON);
    });
  });
}
function syncCatBtns(){
  document.querySelectorAll('.cb').forEach(function(b){b.classList.remove('sel');});
  var cb=document.querySelector('.cb[data-c="'+selCat+'"]');if(cb)cb.classList.add('sel');
}
function toggleOvernight(){isON=!isON;document.getElementById('togON').classList.toggle('on',isON);}
function openModal(){
  closeFab();
  var now=new Date();
  var eh=new Date(now.getTime()+60*60000);
  document.getElementById('fStart').value=pad(now.getHours())+':'+pad(now.getMinutes());
  document.getElementById('fEnd').value  =pad(eh.getHours())+':'+pad(eh.getMinutes());
  document.getElementById('fName').value='';
  isON=selCat==='sleep';
  document.getElementById('togON').classList.toggle('on',isON);
  syncCatBtns();
  document.getElementById('ov').classList.add('show');
  setTimeout(function(){document.getElementById('fName').focus();},350);
}
function closeModal(){document.getElementById('ov').classList.remove('show');}
function saveBlock(){
  var name=document.getElementById('fName').value.trim();
  var start=document.getElementById('fStart').value;
  var end  =document.getElementById('fEnd').value;
  if(!name){showToast('⚠️ Enter a task name');document.getElementById('fName').focus();return;}
  if(!start||!end){showToast('⚠️ Set a time range');return;}
  if(!isON&&toMin(start)>=toMin(end)){showToast('⚠️ End must be after start');return;}
  var bl={id:uid(),n:name,s:start,e:end,c:selCat,done:false,overnight:isON};
  addBlockToDay(viewDay,bl);
  if(isON){
    var ndk=dateKey(addDays(new Date(viewDay+'T12:00:00'),1));
    addBlockToDay(ndk,{id:uid(),n:name+' cont.',s:'00:00',e:end,c:selCat,done:false,cont:true});
    showToast('✅ '+name+' added (overnight)');
  } else {
    showToast('✅ "'+name+'" added');
  }
  renderDay();closeModal();updateBanner();
}

// ════════════════════════════════════════
// FOCUS MODE
// ════════════════════════════════════════
function initFocusUI(){
  var c=document.getElementById('pomoDots');
  for(var i=0;i<4;i++){var d=document.createElement('div');d.className='pomo-dot';d.id='pd-'+i;c.appendChild(d);}
}
function enterFocus(bl){
  var now=new Date();
  var sA=bl.s.split(':').map(Number);
  var eA=bl.e.split(':').map(Number);
  var startMs=new Date(now.getFullYear(),now.getMonth(),now.getDate(),sA[0],sA[1],0).getTime();
  var endMs  =new Date(now.getFullYear(),now.getMonth(),now.getDate(),eA[0],eA[1],0).getTime();
  if(bl.overnight||endMs<=startMs)endMs+=86400000;
  var totalMs=endMs-startMs; // exact task duration

  // If block already fully ended
  if(Date.now()>endMs){showToast('⏰ Block already ended');return;}

  focusBlk=bl;focusPaused=false;
  var col=getCatColor(bl.c);
  document.getElementById('focusBg').style.background=
    'radial-gradient(ellipse 80% 80% at 50% 40%,'+col+'1A 0%,#04050F 70%)';
  var arc=document.getElementById('frArc');
  arc.style.stroke=col;arc.style.filter='drop-shadow(0 0 14px '+col+')';
  for(var i=0;i<4;i++){
    var pd=document.getElementById('pd-'+i);
    if(pd){pd.className='pomo-dot';pd.style.background='';pd.style.color=col;}
  }
  document.getElementById('fNm').textContent=bl.n;
  var qs=QUOTES[bl.c]||QUOTES.study;
  document.getElementById('fQuote').textContent=qs[Math.floor(Math.random()*qs.length)];
  var streak=getStreak(),days30=30-streak;
  document.getElementById('futureBody').textContent=
    days30>0?'Complete this → '+days30+' days left to a 30-day streak.':'🏆 30+ day streak! You\'ve built the habit.';
  document.getElementById('fPauseBtn').textContent='⏸ Pause';
  document.getElementById('fTimer').textContent='--:--';
  document.getElementById('focusScr').classList.add('on');
  clearInterval(focusTid);
  var circ=628.3;

  function tick(){
    if(focusPaused)return;
    var nowMs=Date.now();
    var r;
    if(nowMs<startMs){
      // Not started yet — show full duration, label shows start time
      r=totalMs;
      document.getElementById('fNm').textContent='Starts '+fmt12(bl.s);
      arc.style.strokeDashoffset=0; // full ring
    } else {
      // In progress — count down from end
      document.getElementById('fNm').textContent=bl.n;
      r=endMs-nowMs;
      if(r<=0){clearInterval(focusTid);exitFocus(true);return;}
      arc.style.strokeDashoffset=circ*(r/totalMs);
    }
    var s=Math.floor(r/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
    document.getElementById('fTimer').textContent=
      h>0?pad(h)+':'+pad(m)+':'+pad(sc):pad(m)+':'+pad(sc);
    var elapsed=Math.max(0,nowMs-startMs);
    var done=Math.floor(elapsed/(25*60000));
    for(var i=0;i<4;i++){
      var pd=document.getElementById('pd-'+i);
      if(pd){pd.className='pomo-dot'+(i<done?' done':'');}
    }
  }
  tick();focusTid=setInterval(tick,1000);
}
function togglePause(){
  focusPaused=!focusPaused;
  document.getElementById('fPauseBtn').textContent=focusPaused?'▶ Resume':'⏸ Pause';
}
function exitFocus(markDone){
  clearInterval(focusTid);focusPaused=false;
  document.getElementById('focusScr').classList.remove('on');
  if(focusBlk&&markDone){
    var arr=loadDay(viewDay);
    arr.forEach(function(b,i){if(b.id===focusBlk.id)arr[i].done=true;});
    saveDay(viewDay,arr);
    var today2=new Date().toDateString();
    if(localStorage.getItem('ch5_ld')!==today2){setStreak(getStreak()+1);localStorage.setItem('ch5_ld',today2);}
    renderDay();updateBanner();
    showCelebration(focusBlk);
  }
  focusBlk=null;
}

// ════════════════════════════════════════
// CELEBRATION
// ════════════════════════════════════════
function showCelebration(bl){
  var msgs=CEL_MSGS[bl.c]||['Task complete!'];
  var msg=msgs[Math.floor(Math.random()*msgs.length)];
  var streak=getStreak();
  document.getElementById('celEmoji').textContent=getCatIcon(bl.c)||'🎉';
  document.getElementById('celMsg').textContent=msg;
  document.getElementById('celStreak').textContent=streak>0?'🔥 '+streak+' day streak!':'';
  // particles
  var pc=document.getElementById('celParticles');pc.innerHTML='';
  var PCOLS=['#00E5FF','#00E676','#FFAB40','#FF6B35','#B388FF','#FF4D8D','#5B8AFF'];
  for(var i=0;i<30;i++){
    var p=document.createElement('div');p.className='cp';
    p.style.left=Math.random()*100+'%';
    p.style.background=PCOLS[Math.floor(Math.random()*PCOLS.length)];
    p.style.animationDelay=Math.random()*0.8+'s';
    p.style.animationDuration=(1.2+Math.random()*0.8)+'s';
    var sz=(6+Math.random()*8)+'px';p.style.width=sz;p.style.height=sz;
    pc.appendChild(p);
  }
  var cel=document.getElementById('celebrate');
  cel.classList.add('show');
  setTimeout(function(){cel.classList.remove('show');},3500);
  // tap to dismiss early
  cel.onclick=function(){cel.classList.remove('show');};
}

// ════════════════════════════════════════
// STREAK CHECK
// ════════════════════════════════════════
function checkStreak(){
  var last=localStorage.getItem('ch5_ld');
  if(!last)return;
  var diff=Math.floor((Date.now()-new Date(last).getTime())/86400000);
  if(diff>1){setStreak(0);}
}

// ════════════════════════════════════════
// TOAST
// ════════════════════════════════════════
function showToast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTid);
  toastTid=setTimeout(function(){el.classList.remove('show');},2800);
}
</script>
